name: Build Chrome & Firefox Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-crx:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create key file
        run: echo "${{ secrets.CRX_KEY }}" > key.pem

      - name: Build CRX and ZIP
        run: |
          npx crx3 -p key.pem -o floatcursor.crx -z floatcursor.zip src

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floatcursor-build
          path: |
            floatcursor.crx
            floatcursor.zip
